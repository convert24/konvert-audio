<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konverter Audio Ke WAV</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: var(--card);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }
    h2 { margin-top: 0; color: var(--primary); text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    input[type="file"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: bold; }
    .result { margin-top: 20px; text-align: center; display: none; }
    .result a {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Audio Converter</h2>
  
  <div class="form-group">
    <label for="audioFile">Pilih File Audio (MP3, M4A, OGG, FLAC, dll):</label>
    <input type="file" id="audioFile" accept="audio/*">
  </div>

  <div class="form-group">
    <label for="sampleRate">Sample Rate:</label>
    <select id="sampleRate">
      <option value="44100" selected>44.1 kHz (CD Quality)</option>
      <option value="48000">48.0 kHz (Video Standard)</option>
      <option value="22050">22.05 kHz</option>
    </select>
  </div>

  <div class="form-group">
    <label for="bitDepth">Bit Depth:</label>
    <select id="bitDepth">
      <option value="16" selected>16-bit PCM (Standar)</option>
      <option value="8">8-bit PCM</option>
    </select>
  </div>

  <div class="form-group">
    <label for="channels">Channel / Saluran:</label>
    <select id="channels">
      <option value="2" selected>Stereo (2 Channels)</option>
      <option value="1">Mono (1 Channel)</option>
    </select>
  </div>

  <button id="convertBtn" onclick="convertAudio()">Konversi ke WAV</button>

  <div id="status"></div>
  <div class="result" id="resultArea">
    <p>Konversi Selesai!</p>
    <a id="downloadLink" download="converted.wav">Unduh File WAV</a>
  </div>
</div>

<script>
async function convertAudio() {
  const fileInput = document.getElementById('audioFile');
  const sampleRate = parseInt(document.getElementById('sampleRate').value);
  const bitDepth = parseInt(document.getElementById('bitDepth').value);
  const targetChannels = parseInt(document.getElementById('channels').value);
  const status = document.getElementById('status');
  const resultArea = document.getElementById('resultArea');
  const downloadLink = document.getElementById('downloadLink');

  if (!fileInput.files[0]) {
    alert("Harap pilih file audio terlebih dahulu!");
    return;
  }

  status.innerText = "Membaca & mendekode audio...";
  resultArea.style.display = "none";
  document.getElementById('convertBtn').disabled = true;

  try {
    const file = fileInput.files[0];
    const arrayBuffer = await file.arrayBuffer();

    // 1. Decode Audio ke Raw PCM data menggunakan Web Audio API
    const offlineAudioCtx = new OfflineAudioContext(
      targetChannels,
      1, 
      sampleRate
    );

    const decodedBuffer = await offlineAudioCtx.decodeAudioData(arrayBuffer);

    // 2. Resample ke Sample Rate & Channels yang diinginkan
    const resampleCtx = new OfflineAudioContext(
      targetChannels,
      decodedBuffer.duration * sampleRate,
      sampleRate
    );

    const source = resampleCtx.createBufferSource();
    source.buffer = decodedBuffer;
    source.connect(resampleCtx.destination);
    source.start(0);

    status.innerText = "Memproses resampling audio...";
    const renderedBuffer = await resampleCtx.startRendering();

    // 3. Enkoding ke Header & Data WAV (16-bit / 8-bit PCM)
    status.innerText = "Membuat file WAV...";
    const wavBlob = bufferToWav(renderedBuffer, bitDepth);

    // 4. Buat Link Download
    const url = URL.createObjectURL(wavBlob);
    downloadLink.href = url;
    downloadLink.download = file.name.replace(/\.[^/.]+$/, "") + `_${sampleRate}Hz_${bitDepth}bit.wav`;
    
    status.innerText = "";
    resultArea.style.display = "block";
  } catch (err) {
    console.error(err);
    status.innerText = "Gagal mengkonversi audio. Pastikan format input valid.";
  } finally {
    document.getElementById('convertBtn').disabled = false;
  }
}

// Fungsi Pembantu untuk mengubah AudioBuffer menjadi Blob Format WAV (PCM)
function bufferToWav(buffer, bitDepth) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bytesPerSample = bitDepth / 8;
  const blockAlign = numChannels * bytesPerSample;

  const dataLength = buffer.length * blockAlign;
  const bufferLength = 44 + dataLength;

  const arrayBuffer = new ArrayBuffer(bufferLength);
  const view = new DataView(arrayBuffer);

  /* Header RIFF */
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataLength, true);
  writeString(view, 8, 'WAVE');
  /* Sub-chunk "fmt " */
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true); // ukuran Subchunk1
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true); // ByteRate
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  /* Sub-chunk "data" */
  writeString(view, 36, 'data');
  view.setUint32(40, dataLength, true);

  // Tulis sampel data audio
  const channels = [];
  for (let i = 0; i < numChannels; i++) {
    channels.push(buffer.getChannelData(i));
  }

  let offset = 44;
  for (let i = 0; i < buffer.length; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let sample = channels[ch][i];
      // Clamp sampel ke rentang [-1, 1]
      sample = Math.max(-1, Math.min(1, sample));

      if (bitDepth === 16) {
        // Konversi ke 16-bit Signed Integer
        sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
        view.setInt16(offset, sample, true);
        offset += 2;
      } else if (bitDepth === 8) {
        // Konversi ke 8-bit Unsigned Integer
        sample = (sample + 1) / 2 * 255;
        view.setUint8(offset, sample);
        offset += 1;
      }
    }
  }

  return new Blob([view], { type: 'audio/wav' });
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}
</script>

</body>
</html>
