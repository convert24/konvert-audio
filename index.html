<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konverter Audio Modern</title>
  <style>
    /* --- Variabel & Reset CSS --- */
    :root {
      --color-primary: #3b82f6; /* Biru Modern */
      --color-primary-hover: #2563eb;
      --color-bg: #f1f5f9; /* Abu-abu Sangat Muda */
      --color-card: #ffffff;
      --color-text: #1e293b; /* Abu-abu Sangat Tua */
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --color-success: #10b981; /* Hijau */
      --shadow-card: 0 10px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.06);
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
    }

    /* --- Container Utama --- */
    .container {
      background: var(--color-card);
      padding: 40px;
      border-radius: 20px; /* Sudut lebih membulat */
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 450px; /* Sedikit lebih ramping */
      border: 1px solid var(--color-border);
    }

    /* --- Header --- */
    header {
      text-align: center;
      margin-bottom: 35px;
    }

    h2 {
      color: var(--color-text);
      font-size: 24px;
      font-weight: 800; /* Lebih tebal */
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: var(--color-text-muted);
      font-size: 14px;
    }

    /* --- Elemen Form --- */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 13px;
      color: var(--color-text);
      text-transform: uppercase; /* Gaya modern form */
      letter-spacing: 0.5px;
    }

    /* Styling Universal untuk Input dan Select */
    input[type="file"], 
    select {
      width: 100%;
      padding: 12px 15px;
      background-color: #f8fafc;
      border: 2px solid var(--color-border);
      border-radius: 10px; /* Input membulat */
      font-family: var(--font-family);
      font-size: 15px;
      color: var(--color-text);
      transition: all 0.3s ease;
      appearance: none; /* Hapus styling default OS untuk select */
    }

    /* Custom Arrow untuk Select */
    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: '▼';
      font-size: 10px;
      color: var(--color-text-muted);
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Fokus State */
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: var(--color-primary);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* File Input khusus agar lebih rapi */
    input[type="file"] {
      padding: 8px;
      font-size: 14px;
    }
    input[type=file]::file-selector-button {
      background-color: var(--color-border);
      color: var(--color-text);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
      transition: background 0.2s;
    }
    input[type=file]::file-selector-button:hover {
      background-color: #cbd5e1;
    }

    /* --- Tombol Konversi --- */
    button {
      width: 100%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 25px;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
    }

    button:hover {
      box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.4);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 4px -1px rgba(59, 130, 246, 0.4);
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* --- Area Status & Hasil --- */
    #status {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: var(--color-primary);
      font-weight: 600;
      min-height: 20px; /* Mencegah layout bergeser */
    }

    .result {
      margin-top: 25px;
      text-align: center;
      display: none; /* Disembunyikan secara default */
      background-color: #ecfdf5; /* Latar hijau muda */
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #a7f3d0;
    }

    .result p {
      color: var(--color-success);
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .result a {
      display: inline-block;
      background-color: var(--color-success);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);
    }

    .result a:hover {
      background-color: #059669; /* Hijau lebih tua */
    }

    /* --- Responsif --- */
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
      h2 {
        font-size: 20px;
      }
      button {
        padding: 12px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h2>Audio Converter</h2>
    <p class="subtitle">Ubah file audio Anda ke format WAV dengan mudah.</p>
  </header>

  <div class="form-group">
    <label for="audioFile">Pilih File Audio</label>
    <input type="file" id="audioFile" accept="audio/*">
  </div>

  <div class="form-group">
    <label for="sampleRate">Sample Rate</label>
    <div class="select-wrapper">
      <select id="sampleRate">
        <option value="44100" selected>44.1 kHz (Kualitas CD)</option>
        <option value="48000">48.0 kHz (Standar Video)</option>
        <option value="22050">22.05 kHz</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="bitDepth">Bit Depth</label>
    <div class="select-wrapper">
      <select id="bitDepth">
        <option value="16" selected>16-bit PCM (Standar)</option>
        <option value="8">8-bit PCM</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="channels">Saluran (Channels)</label>
    <div class="select-wrapper">
      <select id="channels">
        <option value="2" selected>Stereo (2 Channels)</option>
        <option value="1">Mono (1 Channel)</option>
      </select>
    </div>
  </div>

  <button id="convertBtn" onclick="convertAudio()">Konversi ke WAV</button>

  <div id="status"></div>
  <div class="result" id="resultArea">
    <p>Konversi Berhasil!</p>
    <a id="downloadLink" download="converted.wav">Unduh File WAV</a>
  </div>
</div>

<script>
// --- JavaScript Tetap Sama, Hanya UI yang Diperbarui ---
async function convertAudio() {
  const fileInput = document.getElementById('audioFile');
  const sampleRate = parseInt(document.getElementById('sampleRate').value);
  const bitDepth = parseInt(document.getElementById('bitDepth').value);
  const targetChannels = parseInt(document.getElementById('channels').value);
  const status = document.getElementById('status');
  const resultArea = document.getElementById('resultArea');
  const downloadLink = document.getElementById('downloadLink');

  if (!fileInput.files[0]) {
    alert("Harap pilih file audio terlebih dahulu!");
    return;
  }

  status.innerText = "Membaca & memproses audio...";
  resultArea.style.display = "none";
  document.getElementById('convertBtn').disabled = true;
  document.getElementById('convertBtn').innerText = "Memproses...";

  try {
    const file = fileInput.files[0];
    const arrayBuffer = await file.arrayBuffer();

    const offlineAudioCtx = new OfflineAudioContext(
      targetChannels,
      1, 
      sampleRate
    );

    const decodedBuffer = await offlineAudioCtx.decodeAudioData(arrayBuffer);

    const resampleCtx = new OfflineAudioContext(
      targetChannels,
      decodedBuffer.duration * sampleRate,
      sampleRate
    );

    const source = resampleCtx.createBufferSource();
    source.buffer = decodedBuffer;
    source.connect(resampleCtx.destination);
    source.start(0);

    const renderedBuffer = await resampleCtx.startRendering();

    status.innerText = "Menyandikan file WAV...";
    const wavBlob = bufferToWav(renderedBuffer, bitDepth);

    const url = URL.createObjectURL(wavBlob);
    downloadLink.href = url;
    
    // Buat nama file dinamis berdasarkan nama asli + setelan
    const originalName = file.name.replace(/\.[^/.]+$/, "");
    downloadLink.download = `${originalName}_${sampleRate/1000}k_${bitDepth}bit.wav`;
    
    status.innerText = "";
    resultArea.style.display = "block";
  } catch (err) {
    console.error(err);
    status.innerText = "Gagal mengkonversi. Pastikan file audio valid.";
  } finally {
    document.getElementById('convertBtn').disabled = false;
    document.getElementById('convertBtn').innerText = "Konversi ke WAV";
  }
}

// Fungsi Pembantu (Tidak Berubah)
function bufferToWav(buffer, bitDepth) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bytesPerSample = bitDepth / 8;
  const blockAlign = numChannels * bytesPerSample;

  const dataLength = buffer.length * blockAlign;
  const bufferLength = 44 + dataLength;

  const arrayBuffer = new ArrayBuffer(bufferLength);
  const view = new DataView(arrayBuffer);

  /* Header RIFF */
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataLength, true);
  writeString(view, 8, 'WAVE');
  /* Sub-chunk "fmt " */
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true); // ukuran Subchunk1
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true); // ByteRate
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  /* Sub-chunk "data" */
  writeString(view, 36, 'data');
  view.setUint32(40, dataLength, true);

  // Tulis sampel data audio
  const channels = [];
  for (let i = 0; i < numChannels; i++) {
    channels.push(buffer.getChannelData(i));
  }

  let offset = 44;
  for (let i = 0; i < buffer.length; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let sample = channels[ch][i];
      // Clamp sampel ke rentang [-1, 1]
      sample = Math.max(-1, Math.min(1, sample));

      if (bitDepth === 16) {
        // Konversi ke 16-bit Signed Integer
        sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
        view.setInt16(offset, sample, true);
        offset += 2;
