<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Converter</title>
    <!-- Font Inter & Remix Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            /* Modern Color Palette - Deep Navy & Slate */
            --bg-app: #080a10;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --border-color: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            
            /*Accent colors*/
            --accent: #58a6ff; /* Bright Blue for modern tech feel */
            --accent-hover: #1f6feb;
            --success: #3fb950;
            
            /* UI Sizing */
            --radius-md: 12px;
            --radius-lg: 16px;
            --container-width: 560px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.5;
        }

        /* Main Container with subtle glow */
        .main-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: var(--container-width);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 0 1px rgba(88, 166, 255, 0.05); /* Subtle accent border shadow */
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.875rem; /* 30px */
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Modern File Upload Area */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 40px 20px;
            text-align: center;
            background: var(--bg-input);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            margin-bottom: 24px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 16px;
            display: block;
            opacity: 0.8;
        }

        .upload-area p {
            font-weight: 600;
            font-size: 1.125rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .upload-area span {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Hidden File Input */
        #uploadImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Preview Container */
        .preview-container {
            margin-bottom: 24px;
            display: none;
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #000; /* Better contrast for images */
        }

        .preview-container img {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: contain;
            display: block;
        }

        /* Form Grid */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 0; /* Handled by grid gap */
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        /* Modern Inputs */
        input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        input[type="number"]:disabled, select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modern Checkbox */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }

        .checkbox-label input {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-input);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .checkbox-label input:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-label input:checked::after {
            content: "\f0c2"; /* Remix Icon Check Line */
            font-family: "remixicon";
            font-size: 14px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-app);
        }

        /* Action Button */
        .convert-btn {
            width: 100%;
            background-color: var(--accent);
            color: #010409; /* Very dark text for contrast */
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .convert-btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .convert-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .convert-btn:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .convert-btn i {
            font-size: 1.25rem;
        }

        /* Footer/Credit */
        .credit {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .main-container {
                padding: 20px;
            }
            .controls-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .upload-area {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1>Image Resizer Pro</h1>
            <p>Ubah ukuran dan format gambar dengan mudah</p>
        </div>

        <!-- Modern Dropzone -->
        <div class="upload-area" id="dropZone">
            <i class="ri-upload-2-line"></i>
            <p>Geser & Lepas Gambar</p>
            <span>Atau klik untuk mencari berkas</span>
            <input type="file" id="uploadImage" accept="image/*">
        </div>

        <!-- Preview Container -->
        <div class="preview-container" id="previewWrapper">
            <img id="imagePreview" alt="Preview">
        </div>

        <!-- Controls Grid -->
        <div class="controls-grid">
            <div class="form-group">
                <label for="widthInput">Width (px)</label>
                <input type="number" id="widthInput" placeholder="E.g. 1920" disabled>
            </div>
            <div class="form-group">
                <label for="heightInput">Height (px)</label>
                <input type="number" id="heightInput" placeholder="E.g. 1080" disabled>
            </div>
        </div>

        <!-- Aspect Ratio Checkbox -->
        <div class="form-group" style="margin-bottom: 16px;">
            <label class="checkbox-label">
                <input type="checkbox" id="aspectRatio" checked disabled>
                Pertahankan rasio aspek
            </label>
        </div>

        <!-- Format Select -->
        <div class="form-group" style="margin-bottom: 24px;">
            <label for="formatSelect">Output Format</label>
            <select id="formatSelect" disabled>
                <option value="image/jpeg">JPG / JPEG (Kualitas Tinggi)</option>
                <option value="image/png">PNG (Transparan)</option>
                <option value="image/webp">WEBP (Modern/Kecil)</option>
            </select>
        </div>

        <!-- Action Button -->
        <button class="convert-btn" id="convertBtn" disabled>
            <i class="ri-download-cloud-2-line"></i>
            Proses & Unduh Gambar
        </button>

        <div class="credit">Powered by HTML5 Canvas & modern web tech</div>
    </div>

    <script>
        // --- DOM ELEMENTS ---
        const uploadImage = document.getElementById('uploadImage');
        const dropZone = document.getElementById('dropZone');
        const imagePreview = document.getElementById('imagePreview');
        const previewWrapper = document.getElementById('previewWrapper');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const aspectRatio = document.getElementById('aspectRatio');
        const formatSelect = document.getElementById('formatSelect');
        const convertBtn = document.getElementById('convertBtn');

        // --- STATE ---
        let originalImage = new Image();
        let originalWidth = 0;
        let originalHeight = 0;

        // --- UTILITIES ---

        // Fungsi utama menangani file yang dimuat
        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('Tolong unggah berkas gambar yang valid (JPG, PNG, WebP).');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.src = event.target.result;
                originalImage.onload = function() {
                    originalWidth = originalImage.width;
                    originalHeight = originalImage.height;

                    // Set nilai input ke ukuran asli
                    widthInput.value = originalWidth;
                    heightInput.value = originalHeight;

                    // Tampilkan preview
                    imagePreview.src = originalImage.src;
                    previewWrapper.style.display = 'block';

                    // Aktifkan semua kontrol
                    widthInput.disabled = false;
                    heightInput.disabled = false;
                    aspectRatio.disabled = false;
                    formatSelect.disabled = false;
                    convertBtn.disabled = false;

                    // Tambahkan animasi/efek visual pada tombol
                    convertBtn.style.animation = 'pulse 1s infinite';
                    setTimeout(() => convertBtn.style.animation = 'none', 1000);
                }
            }
            reader.readAsDataURL(file);
        }

        // --- EVENT LISTENERS ---

        // 1. Klik pada area upload
        uploadImage.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        // 2. Drag and Drop
        // Mencegah aksi default browser
        ['dragover', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drop zone saat file di atasnya
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });
